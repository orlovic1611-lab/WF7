
<!DOCTYPE html>

<html>

<head>

<title>WF Security Framework</title>


<style>

body{

background:#050505;

color:#00ff88;

font-family:monospace;

padding:30px;

}


.card{

border:1px solid #00ff88;

padding:20px;

margin:15px;

border-radius:10px;

}



button{

background:#00ff88;

border:0;

padding:8px;

}



</style>


</head>



<body>


<h1>
WF SECURITY FRAMEWORK
</h1>



<div class="card">

<h2>System</h2>

<pre id="system">
loading...
</pre>

</div>




<div class="card">

<h2>Plugins</h2>

<div id="plugins"></div>

<pre id="output"></pre>


</div>




<script>


fetch("/api/system")

.then(r=>r.json())

.then(d=>{

system.innerHTML=
JSON.stringify(d,null,2)

})





fetch("/api/plugins")

.then(r=>r.json())

.then(d=>{


let box=document.getElementById("plugins");


d.plugins.forEach(p=>{


box.innerHTML +=

`
<button onclick="runPlugin('${p}')">
${p}
</button>
<br><br>
`


})


})




function runPlugin(name){


fetch("/api/plugin/"+name)

.then(r=>r.json())

.then(d=>{


output.innerHTML=
JSON.stringify(d,null,2)


})


}



</script>


</body>


</html>
